<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<title>404 — Page Not Found | Ajmal Mubarak</title>
	<meta name="description" content="The page you're looking for doesn't exist. Return to Ajmal Mubarak's portfolio — Python Full Stack Web Developer in Kerala.">
	<meta name="robots" content="noindex, follow">
	<link rel="canonical" href="https://ajmalmubarak.in/">
	<link rel="icon" type="image/png" sizes="32x32" href="https://ajmalmubarak.in/images/logoico.png">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
	<style>
		*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

		body {
			font-family: 'Poppins', sans-serif;
			background: #0a0a12;
			color: #fff;
			min-height: 100vh;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			padding: 2rem;
			overflow: hidden;
			position: relative;
		}

		/* Background orbs */
		.orb {
			position: fixed;
			border-radius: 50%;
			filter: blur(80px);
			opacity: 0.18;
			pointer-events: none;
			z-index: 0;
		}
		.orb-1 { width: 500px; height: 500px; background: #7c3aed; top: -150px; left: -150px; }
		.orb-2 { width: 400px; height: 400px; background: #2563eb; bottom: -100px; right: -100px; }
		.orb-3 { width: 300px; height: 300px; background: #06b6d4; top: 50%; left: 50%; transform: translate(-50%,-50%); }

		.container {
			position: relative;
			z-index: 1;
			text-align: center;
			max-width: 620px;
		}

		.error-code {
			font-size: clamp(6rem, 18vw, 10rem);
			font-weight: 800;
			line-height: 1;
			background: linear-gradient(135deg, #7c3aed 0%, #2563eb 50%, #06b6d4 100%);
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
			background-clip: text;
			margin-bottom: 0.5rem;
			animation: pulse-glow 3s ease-in-out infinite;
		}

		@keyframes pulse-glow {
			0%, 100% { opacity: 1; }
			50% { opacity: 0.85; }
		}

		.error-icon {
			font-size: 3rem;
			margin-bottom: 1rem;
			display: block;
			animation: float 3s ease-in-out infinite;
		}

		@keyframes float {
			0%, 100% { transform: translateY(0); }
			50% { transform: translateY(-12px); }
		}

		h1 {
			font-size: clamp(1.4rem, 4vw, 2rem);
			font-weight: 700;
			margin-bottom: 0.75rem;
			color: #f1f5f9;
		}

		p {
			font-size: 1rem;
			color: #94a3b8;
			line-height: 1.7;
			margin-bottom: 2.5rem;
		}

		.btn-group {
			display: flex;
			gap: 1rem;
			justify-content: center;
			flex-wrap: wrap;
			margin-bottom: 3rem;
		}

		.btn {
			display: inline-flex;
			align-items: center;
			gap: 0.5rem;
			padding: 0.8rem 1.8rem;
			border-radius: 50px;
			font-family: 'Poppins', sans-serif;
			font-size: 0.9rem;
			font-weight: 600;
			text-decoration: none;
			transition: all 0.3s ease;
			cursor: pointer;
			border: none;
		}

		.btn-primary {
			background: linear-gradient(135deg, #7c3aed, #2563eb);
			color: #fff;
			box-shadow: 0 4px 20px rgba(124,58,237,0.4);
		}
		.btn-primary:hover {
			transform: translateY(-2px);
			box-shadow: 0 8px 30px rgba(124,58,237,0.6);
		}

		.btn-outline {
			background: transparent;
			color: #94a3b8;
			border: 1.5px solid rgba(148,163,184,0.3);
		}
		.btn-outline:hover {
			border-color: #7c3aed;
			color: #a78bfa;
			transform: translateY(-2px);
		}

		.quick-links {
			display: flex;
			gap: 0.75rem;
			justify-content: center;
			flex-wrap: wrap;
		}

		.quick-link {
			color: #64748b;
			text-decoration: none;
			font-size: 0.82rem;
			padding: 0.35rem 0.8rem;
			border-radius: 20px;
			border: 1px solid rgba(100,116,139,0.2);
			transition: all 0.25s ease;
		}

		.quick-link:hover {
			color: #a78bfa;
			border-color: rgba(167,139,250,0.4);
			background: rgba(124,58,237,0.08);
		}

		.divider {
			width: 60px;
			height: 2px;
			background: linear-gradient(90deg, transparent, #7c3aed, transparent);
			margin: 0 auto 2rem;
		}

		.glitch {
			position: relative;
		}
		.glitch::before,
		.glitch::after {
			content: '404';
			position: absolute;
			top: 0; left: 0; right: 0;
			background: linear-gradient(135deg, #7c3aed 0%, #2563eb 50%, #06b6d4 100%);
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
			background-clip: text;
		}
		.glitch::before { animation: glitch1 4s infinite; clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%); }
		.glitch::after  { animation: glitch2 4s infinite; clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%); }

		@keyframes glitch1 {
			0%,94%,100% { transform: none; opacity: 0; }
			95% { transform: translate(-3px,0); opacity: 0.7; }
			97% { transform: translate(3px,0); opacity: 0.7; }
		}
		@keyframes glitch2 {
			0%,94%,100% { transform: none; opacity: 0; }
			95% { transform: translate(3px,0); opacity: 0.7; }
			97% { transform: translate(-3px,0); opacity: 0.7; }
		}
	</style>
</head>
<body>
	<div class="orb orb-1"></div>
	<div class="orb orb-2"></div>
	<div class="orb orb-3"></div>

	<div class="container">
		<span class="error-icon">🔍</span>
		<div class="error-code glitch">404</div>
		<div class="divider"></div>
		<h1>Page Not Found</h1>
		<p>The page you're looking for seems to have vanished into the void.<br>
		   Don't worry — let's get you back on track.</p>

		<div class="btn-group">
			<a href="/" class="btn btn-primary">
				<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
				Go Home
			</a>
			<a href="/#contact-section" class="btn btn-outline">
				<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
				Contact Me
			</a>
		</div>

		<div class="quick-links">
			<a href="/#about-section" class="quick-link">About</a>
			<a href="/#projects-section" class="quick-link">Projects</a>
			<a href="/#services-section" class="quick-link">Services</a>
			<a href="/#skills-section" class="quick-link">Skills</a>
			<a href="/#resume-section" class="quick-link">Resume</a>
		</div>
	</div>
</body>
</html>
