<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<title>404 — Page Not Found | Ajmal Mubarak</title>
	<meta name="description" content="The page you're looking for doesn't exist. Return to Ajmal Mubarak's portfolio — Python Full Stack Web Developer in Kerala.">
	<meta name="robots" content="noindex, follow">
	<link rel="canonical" href="https://ajmalmubarak.in/">
	<link rel="icon" type="image/png" sizes="32x32" href="https://ajmalmubarak.in/images/logoico.png">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
	<style>
		*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

		:root {
			--bg:        #0d0d0d;
			--bg-card:   #141414;
			--border:    rgba(255,255,255,0.07);
			--accent:    #f5a623;
			--accent2:   #e8893d;
			--text:      #e8e8e8;
			--subtext:   #888;
			--muted:     #555;
		}

		body {
			font-family: 'Poppins', sans-serif;
			background: var(--bg);
			color: var(--text);
			min-height: 100vh;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			padding: 2rem;
			position: relative;
			overflow: hidden;
		}

		/* Subtle matte texture grid */
		body::before {
			content: '';
			position: fixed;
			inset: 0;
			background-image:
				linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
				linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
			background-size: 60px 60px;
			pointer-events: none;
			z-index: 0;
		}

		/* Very subtle warm vignette in center — not glowing, just depth */
		body::after {
			content: '';
			position: fixed;
			inset: 0;
			background: radial-gradient(ellipse 60% 50% at 50% 50%,
				rgba(245,166,35,0.04) 0%,
				transparent 70%);
			pointer-events: none;
			z-index: 0;
		}

		.container {
			position: relative;
			z-index: 1;
			text-align: center;
			max-width: 560px;
			width: 100%;
		}

		/* Brand */
		.brand {
			font-size: 0.75rem;
			font-weight: 600;
			letter-spacing: 0.25em;
			text-transform: uppercase;
			color: var(--muted);
			margin-bottom: 2.5rem;
		}

		.brand a {
			color: var(--accent);
			text-decoration: none;
			transition: opacity 0.2s;
		}
		.brand a:hover { opacity: 0.75; }

		/* 404 Code */
		.error-code {
			font-size: clamp(5.5rem, 18vw, 9rem);
			font-weight: 800;
			line-height: 1;
			letter-spacing: -0.04em;
			color: #1c1c1c;
			-webkit-text-stroke: 1.5px rgba(255,255,255,0.1);
			position: relative;
			display: inline-block;
			margin-bottom: 0.25rem;
			animation: subtle-lift 6s ease-in-out infinite;
		}

		/* Accent highlight on the zero */
		.error-code .accent-0 {
			color: transparent;
			-webkit-text-stroke: 1.5px var(--accent);
			text-shadow: 0 0 40px rgba(245,166,35,0.15);
		}

		@keyframes subtle-lift {
			0%,100% { transform: translateY(0); }
			50%      { transform: translateY(-6px); }
		}

		/* Divider line */
		.divider {
			width: 40px;
			height: 2px;
			background: var(--accent);
			margin: 1.5rem auto;
			opacity: 0.6;
		}

		h1 {
			font-size: clamp(1.1rem, 3.5vw, 1.5rem);
			font-weight: 600;
			color: var(--text);
			margin-bottom: 0.6rem;
		}

		p.sub {
			font-size: 0.9rem;
			color: var(--subtext);
			line-height: 1.75;
			margin-bottom: 2.5rem;
		}

		/* Buttons */
		.btn-group {
			display: flex;
			gap: 0.8rem;
			justify-content: center;
			flex-wrap: wrap;
			margin-bottom: 2.5rem;
		}

		.btn {
			display: inline-flex;
			align-items: center;
			gap: 0.45rem;
			padding: 0.7rem 1.6rem;
			border-radius: 6px;
			font-family: 'Poppins', sans-serif;
			font-size: 0.85rem;
			font-weight: 600;
			text-decoration: none;
			transition: all 0.25s ease;
			cursor: pointer;
			border: none;
			letter-spacing: 0.02em;
		}

		.btn-primary {
			background: var(--accent);
			color: #0d0d0d;
		}
		.btn-primary:hover {
			background: var(--accent2);
			transform: translateY(-2px);
			box-shadow: 0 6px 24px rgba(245,166,35,0.25);
		}

		.btn-outline {
			background: transparent;
			color: var(--subtext);
			border: 1px solid var(--border);
		}
		.btn-outline:hover {
			border-color: rgba(245,166,35,0.4);
			color: var(--accent);
			transform: translateY(-2px);
		}

		/* Quick links */
		.quick-links {
			display: flex;
			gap: 0.5rem;
			justify-content: center;
			flex-wrap: wrap;
		}

		.quick-link {
			color: var(--muted);
			text-decoration: none;
			font-size: 0.78rem;
			padding: 0.3rem 0.75rem;
			border-radius: 4px;
			border: 1px solid rgba(255,255,255,0.05);
			transition: all 0.2s ease;
			letter-spacing: 0.03em;
		}

		.quick-link:hover {
			color: var(--accent);
			border-color: rgba(245,166,35,0.3);
			background: rgba(245,166,35,0.05);
		}

		/* Scanline bar at bottom for depth */
		.scanline {
			position: fixed;
			bottom: 0;
			left: 0;
			right: 0;
			height: 2px;
			background: linear-gradient(90deg, transparent, var(--accent), transparent);
			opacity: 0.3;
		}

		/* Responsive */
		@media (max-width: 480px) {
			.btn-group { gap: 0.6rem; }
			.btn { padding: 0.65rem 1.2rem; font-size: 0.8rem; }
		}
	</style>
</head>
<body>

	<div class="container">

		<p class="brand"><a href="/">Ajmal Mubarak</a> &nbsp;/&nbsp; 404</p>

		<div class="error-code">4<span class="accent-0">0</span>4</div>

		<div class="divider"></div>

		<h1>Page Not Found</h1>
		<p class="sub">
			The page you're looking for has gone missing.<br>
			Let's get you back somewhere useful.
		</p>

		<div class="btn-group">
			<a href="/" class="btn btn-primary" id="btn-go-home">
				<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
				Go Home
			</a>
			<a href="/#contact-section" class="btn btn-outline" id="btn-contact">
				<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
				Contact Me
			</a>
		</div>

		<div class="quick-links">
			<a href="/#about-section"    class="quick-link" id="ql-about">About</a>
			<a href="/#projects-section" class="quick-link" id="ql-projects">Projects</a>
			<a href="/#services-section" class="quick-link" id="ql-services">Services</a>
			<a href="/#skills-section"   class="quick-link" id="ql-skills">Skills</a>
			<a href="/#resume-section"   class="quick-link" id="ql-resume">Resume</a>
		</div>

	</div>

	<div class="scanline"></div>

</body>
</html>
